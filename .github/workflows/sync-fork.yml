name: Sync to thewoodfish fork

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to thewoodfish/TipMind
        run: |
          git remote add woodfish https://x-access-token:${{ secrets.WOODFISH_TOKEN }}@github.com/thewoodfish/TipMind.git
          git push woodfish main --force
